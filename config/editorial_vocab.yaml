# editorial_vocab.yaml — allowed transition families, shot-length ranges,
# pacing presets. The 07_editorial_direction agent may ONLY choose values
# from this file; it must never invent a transition type or exceed a
# pacing preset's bounds (CLAUDE.md section 4).

transition_families:
  - hard-cut
  - crossfade
  - dip-to-black
  - match-cut-suggestion

# Real transition duration used by 08_timeline_builder (populates
# timeline.json's transition_out.duration_s) and 11_assembly_render (how
# long the actual blend/fade runs). hard-cut and match-cut-suggestion are
# instant (0.0) - a "match cut" is a hard cut with a compositional match,
# not a timed blend. crossfade overlaps two clips (borrows this much time
# from each side, shortening total runtime slightly - see
# 11_assembly_render/README.md); dip-to-black is an in-place fade with no
# runtime change.
transition_durations_s:
  hard-cut: 0.0
  crossfade: 0.75
  dip-to-black: 0.5
  match-cut-suggestion: 0.0

pacing_presets:
  slow-burn:
    hold_duration_s: { min: 2.5, max: 6.0 }
    max_shots_per_beat: 2
  standard:
    hold_duration_s: { min: 1.5, max: 4.0 }
    max_shots_per_beat: 3
  fast-cut:
    hold_duration_s: { min: 0.5, max: 2.0 }
    max_shots_per_beat: 3
  dynamic:
    # A different shot (ideally a different available_asset - a different
    # camera angle) roughly every 3-4s, to keep a scene from reading as one
    # long static hold. See DECISIONS_LOG.md 2026-07-17.
    hold_duration_s: { min: 3.0, max: 4.0 }
    max_shots_per_beat: 4

# Subdividing one asset into more than this many shots is always a HITL
# trigger (CLAUDE.md section 4), independent of pacing preset.
hitl_shot_subdivision_threshold: 3

# Transition the deterministic (CODE-default) edit plan places at every beat
# boundary. Added 2026-07-23 (see ARCHITECTURE.md change log): author found
# uniform hard-cuts visually flat on the real chapter-1 output; a gentle
# crossfade at beat boundaries reads far better for narrated prose. Must be
# one of transition_families. The repeated_dramatic_transition HITL check
# exempts this configured default - that check guards an *agent* leaning on
# the same dramatic transition as a repeated creative choice, which a
# config-driven mechanical default is not.
default_beat_transition: crossfade
