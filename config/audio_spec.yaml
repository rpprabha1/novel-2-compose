# audio_spec.yaml — LUFS targets, ducking, crossfades, and the tone -> music
# mood-tag mapping. The 09_audio_production agent may ONLY choose mood tags
# listed here; mixing math (ducking, crossfades, normalization) is CODE and
# reads these numbers, never hardcodes them (CLAUDE.md section 4).

loudness:
  target_lufs: -16.0
  tolerance_lu: 1.0

ducking:
  depth_db: -12
  attack_ms: 150
  release_ms: 300

crossfade:
  default_length_s: 1.5

# tone (from run_config.yaml) -> allowed music mood tags. Populated per-tone
# as tones are actually used in a run; never branched on in code (CLAUDE.md
# section 0 hard rule: genre/tone intent is data, not "if genre == ..." code).
tone_music_tags:
  gothic-suspense:
    - tense
    - quiet
    - ominous
    - sparse
  # Added 2026-07-21 for the Animal Farm run - see DECISIONS_LOG.md.
  political-allegory:
    - tense
    - urgent
    - somber
    - triumphant
    - wise
    - cynical

# mood tags available to 02_beat_extraction for beat-level tagging; the
# audio agent draws cue mood tags from the union of beat mood_tags and this
# tone's allowed list above.
# Expanded 2026-07-21 (angry/calm/curious/omniscient/protective/sad/social/wise
# added): the original 9-word list was tuned against a physical-action fixture
# scene and was too narrow for a moral/philosophical speech (Animal Farm ch1's
# Major's speech) - real run hit mood_tag_outside_vocabulary for real, human
# decided to expand rather than retry or hand-correct - see DECISIONS_LOG.md.
# `cynical` added same day, same run, same human decision applied a second
# time (satirical/political tone genuinely needs it) - see DECISIONS_LOG.md.
mood_vocabulary:
  - tense
  - quiet
  - ominous
  - sparse
  - triumphant
  - somber
  - playful
  - romantic
  - urgent
  - angry
  - calm
  - curious
  - omniscient
  - protective
  - sad
  - social
  - wise
  - cynical

# Pipeline mood tag -> Jamendo folksonomy tags (2026-07-23, added with the
# JamendoMusicSource - see ARCHITECTURE.md change log). Jamendo's fuzzytags
# matches against its own community tag vocabulary; our mood words mostly
# aren't in it (verified live: unmapped queries silently fall back to overall
# popularity, returning identical results regardless of mood). Data mapping
# per the genre-agnostic hard rule - never branched on in code.
jamendo_tag_map:
  tense: "dark suspense"
  quiet: "calm ambient"
  ominous: "dark drone"
  sparse: "ambient minimal"
  triumphant: "epic orchestral"
  somber: "sad melancholic"
  playful: "happy upbeat"
  romantic: "romantic emotional"
  urgent: "energetic dramatic"
  angry: "aggressive intense"
  calm: "calm peaceful"
  curious: "mysterious light"
  omniscient: "ambient cinematic"
  protective: "warm emotional"
  sad: "sad piano"
  social: "upbeat folk"
  wise: "emotional cinematic"
  cynical: "dark quirky"
