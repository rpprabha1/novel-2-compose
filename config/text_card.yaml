# text_card.yaml — style parameters for 06_fallback_generation's default
# lightweight CODE fallback (see ARCHITECTURE.md 2026-07-18): a plain ffmpeg
# text card (wrapped beat text over a solid background), used instead of
# the heavier sd-turbo diffusion path. No agent involved - card text is the
# beat's own visual_description, not an LLM-authored prompt.

width: 1920
height: 1080
fps: 30
bg_color: "0x1a1a2e"
text_color: "white"
font_path: "C:/Windows/Fonts/arial.ttf"
font_size: 42
max_chars_per_line: 42

# A text card is synthetic - unlike real stock footage it has no natural
# duration ceiling, so it's always rendered at least this long regardless
# of the beat's (rough) est_duration_s. Prevents asset_too_short_for_narration
# in 08_timeline_builder once real (much longer) TTS narration is known -
# caught for real: a beat's narration ran 3-5x its est_duration_s estimate.
min_duration_s: 20.0
