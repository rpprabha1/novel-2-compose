# thresholds.yaml — similarity cutoffs, score margins, duration tolerances
#
# Every numeric gate/threshold referenced anywhere in ARCHITECTURE.md or a
# stage README lives here. No stage may hardcode one of these values.

gate0:
  # Minimum (good + marginal) / total_beats coverage rate for Gate 0 to pass.
  # See ARCHITECTURE.md section 3 for the full procedure and criterion.
  min_coverage_pct: 70

candidate_fetch:
  # Max results requested per beat, per FootageSource.
  max_results_per_source: 5

scene_scoring:
  # 01_2_scene_scoring samples this many frames per downloaded clip (evenly
  # spaced) and averages their CLIP similarity to each beat's visual_description.
  # Mirrors retrieval_verification.frames_per_candidate; kept separate so the
  # two lanes can be tuned independently.
  frames_per_clip: 3

downloader_selection:
  # How many top-ranked clips per beat 07_2_narration_shot_mapping draws shots
  # from (rank 1..N), so a beat's coverage can alternate across several distinct
  # real clips instead of one. (Also used by the now-retired-from-flow
  # shared/downloader_assets.py bridge.)
  assets_per_beat: 3

shot_extraction:
  # 07_2_narration_shot_mapping cuts each beat's narration window into shots
  # this long (seconds), physically extracted from the downloader clips.
  # null = use the active pacing preset's hold_duration_s.max (config/
  # editorial_vocab.yaml), keeping shot length consistent with the pacing
  # vocabulary (4.0s for "standard"). Set a number to override.
  target_shot_length_s: null
  # A trailing remainder shorter than this is absorbed into the previous shot
  # rather than emitted as a sub-second sliver clip.
  min_shot_length_s: 1.0
  # Hard ceiling on shots per beat (edit_plan.schema.json caps shots at 12);
  # if a beat's narration would need more, shot length is stretched to fit.
  max_shots_per_beat: 12
  # How many of each beat's top-ranked clips are eligible to be drawn from when
  # placing that beat's shots. Larger than downloader_selection.assets_per_beat
  # on purpose: on a repetitive scene (e.g. one long speech) the SAME few clips
  # score highest for most beats, so a narrow top-3 pool makes the same footage
  # repeat across the whole video. CLIP scores are near-flat past rank ~3 here,
  # so widening the pool costs almost no relevance but greatly increases variety.
  # Selection within the pool is least-recently/least-used-first across the whole
  # scene, avoiding back-to-back repeats and advancing a per-clip window cursor
  # so a reused clip shows a fresh segment, not the same one. (Falls back to
  # downloader_selection.assets_per_beat if unset - keeps small test fixtures
  # behaving as before.)
  candidate_pool_per_beat: 10

clip_reranking:
  # Minimum CLIP cosine similarity for a candidate to route to verification (04 -> 05).
  similarity_cutoff: 0.28
  # Candidates within this margin of the cutoff are flagged retrievable: low
  # and batched for human tie-break in 05 rather than auto-routed.
  close_score_margin: 0.03

retrieval_verification:
  # How many top candidates per beat get downloaded and frame-sampled.
  top_k: 3
  # Frames sampled per candidate video (evenly spaced) for re-scoring.
  frames_per_candidate: 3
  # How many verified candidates per beat to retain in assets_manifest.json
  # (ranked 1..N, rank 1 = the winning/primary asset). Lets 07_editorial_direction
  # cut a beat across multiple distinct clips ("camera angles") instead of only
  # ever having the single winning asset available. Assets beyond this count
  # were still downloaded/verified but are dropped, same as before this existed.
  assets_per_beat: 3

editorial:
  # A beat's winning asset shorter than this (seconds) cannot be used as-is;
  # the editorial agent must emit NEEDS_INPUT (reason: asset_too_short)
  # rather than stretch or loop it.
  min_viable_shot_length_s: 1.5
  # Beat-level total runtime is allowed to drift from the beat plan's sum of
  # est_duration_s by up to this percent before it's a HITL trigger.
  max_runtime_drift_pct: 15
  # A hold_duration_s just outside the active pacing preset's range (by up to
  # this percent of the range's span) is coerced to the nearest bound instead
  # of blocking on NEEDS_INPUT - a small local model's numeric imprecision,
  # not a genuine editorial violation. The range itself is never widened;
  # anything beyond this tolerance still blocks. See DECISIONS_LOG.md 2026-07-14.
  hold_duration_clamp_tolerance_pct: 10

qa:
  # Final duration vs. planned duration tolerance for QA's duration_tolerance check.
  duration_tolerance_pct: 5

pixel_art:
  # 13_pixel_art_conversion only re-filters existing frames (no cuts/re-timing),
  # so output duration should match the source almost exactly.
  duration_tolerance_pct: 1

anime_style:
  # 14_anime_style_conversion re-times through a reduced-then-restored frame
  # rate (see anime_style_spec.yaml) rather than a straight 1:1 re-filter, so
  # allow a little more drift than pixel_art's re-filter-only tolerance.
  duration_tolerance_pct: 2
